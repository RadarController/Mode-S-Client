<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Glass Footer</title>

  <style>
    :root{
      --blue:#1e6dff;
      --panel: rgba(18,22,28,.72);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(233,238,247,.92);
      --muted: rgba(233,238,247,.70);
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      background:transparent;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
      overflow:hidden;
    }

    .bar{
      width:100%;
      height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 18px;
      box-sizing:border-box;
      background:var(--panel);
      backdrop-filter:blur(8px);
      -webkit-backdrop-filter:blur(8px);
      border-top:1px solid var(--stroke);
      pointer-events:none;
    }

    .strip{
      width:min(1160px, 100%);
      display:grid;
      grid-template-columns: minmax(0, 1fr) minmax(340px, 1.25fr) minmax(0, 1fr);
      align-items:center;
      gap:12px;
    }

    .segment{
      min-width:0;
      height:40px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding:0 14px;
      border-radius:999px;
      background:rgba(10,14,18,.35);
      border:1px solid rgba(255,255,255,.12);
      box-sizing:border-box;
      color:var(--text);
      white-space:nowrap;
      overflow:hidden;
      position:relative;
    }

    .segment::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,0));
      pointer-events:none;
    }

    .icon{
      width:7px;
      height:7px;
      border-radius:50%;
      background:rgba(30,109,255,.9);
      box-shadow:0 0 0 3px rgba(30,109,255,.18);
      flex:0 0 auto;
      position:relative;
      z-index:1;
    }

    .label{
      color:var(--muted);
      font-size:10px;
      font-weight:650;
      letter-spacing:.12em;
      text-transform:uppercase;
      flex:0 0 auto;
      position:relative;
      z-index:1;
    }

    .value{
      color:var(--text);
      font-size:12px;
      font-weight:600;
      letter-spacing:.02em;
      overflow:hidden;
      text-overflow:ellipsis;
      position:relative;
      z-index:1;
    }

    .value--swap{
      min-width:250px;
      text-align:right;
      transition:opacity .2s ease, transform .2s ease;
    }

    .value--swap.is-swapping{
      opacity:.35;
      transform:translateY(-1px);
    }

    .segment--left{
      justify-content:flex-start;
      padding-left:16px;
    }

    .segment--right{
      justify-content:flex-end;
      padding-right:16px;
    }

    .segment--sponsor{
      justify-content:center;
      gap:12px;
      padding:0 18px;
      background:linear-gradient(180deg, rgba(10,14,18,.42), rgba(10,14,18,.30));
    }

    .divider{
      width:1px;
      height:18px;
      background:rgba(255,255,255,.10);
      flex:0 0 auto;
      position:relative;
      z-index:1;
    }

    .sponsor-lockup{
      display:flex;
      align-items:center;
      gap:10px;
      min-width:0;
      position:relative;
      z-index:1;
    }

    .sponsor-mark{
      width:76px;
      height:auto;
      display:block;
      filter:drop-shadow(0 1px 6px rgba(0,0,0,.25));
      flex:0 0 auto;
    }

    .sponsor-copy{
      display:flex;
      flex-direction:column;
      min-width:0;
      line-height:1.05;
    }

    .sponsor-name{
      color:var(--text);
      font-size:14px;
      font-weight:800;
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .sponsor-role{
      color:var(--muted);
      font-size:10px;
      font-weight:650;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-top:2px;
    }

    @media (max-width: 980px) {
      .strip{
        grid-template-columns:1fr;
        gap:8px;
      }

      .segment{
        height:38px;
      }

      .segment--left,
      .segment--right,
      .segment--sponsor{
        justify-content:center;
        padding-left:14px;
        padding-right:14px;
      }

      .value--swap{
        min-width:0;
        text-align:center;
      }
    }

    @media (max-width: 620px) {
      .segment{
        gap:8px;
        padding:0 12px;
      }

      .label{
        display:none;
      }

      .divider{
        display:none;
      }

      .sponsor-mark{
        width:64px;
      }

      .sponsor-name{
        font-size:13px;
        letter-spacing:.12em;
      }
    }
  </style>
</head>

  <script>
    const watchItems = [
      "twitch.tv/radarcontroller",
      "tiktok.com/@radarcontroller",
      "youtube.com/@radarcontroller"
    ];

    const watchValue = document.getElementById("watchValue");
    let watchIndex = 0;

    function advanceWatchItem() {
      if (!watchValue) return;

      watchValue.classList.add("is-swapping");

      setTimeout(() => {
        watchIndex = (watchIndex + 1) % watchItems.length;
        watchValue.textContent = watchItems[watchIndex];
        watchValue.classList.remove("is-swapping");
      }, 180);
    }

    setInterval(advanceWatchItem, 5000);
  </script>
