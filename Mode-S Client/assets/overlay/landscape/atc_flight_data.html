<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ATC Flight Data</title>
  <style>
    :root{
      --blue:#1e6dff;
      --panel: rgba(18,22,28,.78);
      --stroke: rgba(255,255,255,.12);
      --stroke-soft: rgba(255,255,255,.08);
      --text: rgba(233,238,247,.92);
      --muted: rgba(233,238,247,.62);
      --muted-soft: rgba(233,238,247,.52);
      --radius: 16px;
      --edge: 0px;
      --card-w: 388px;
      --header-h: 44px;
      --title-size: 12px;
    }

    html,body{
      width:100%;height:100%;margin:0;background:transparent;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden;
    }

    .stage{position:relative;width:100%;height:100%;overflow:hidden;background:transparent;}

    .card{
      position:absolute;top:var(--edge);left:var(--edge);width:var(--card-w);
      box-sizing:border-box;overflow:hidden;pointer-events:none;
      border-radius:var(--radius);
      backdrop-filter: blur(8px);-webkit-backdrop-filter: blur(8px);
      min-height:0;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      border-radius:var(--radius);
      border:1px solid var(--stroke);
      background:var(--panel);
      pointer-events:none;
    }

    .header{
      position:absolute;
      top:0;left:0;right:0;
      height:var(--header-h);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 14px;border-bottom:1px solid rgba(255,255,255,.08);
      box-sizing:border-box;
      z-index:1;
    }

    .title{
      font-weight:650;letter-spacing:.08em;text-transform:uppercase;font-size:var(--title-size);
      color:var(--text);display:flex;align-items:center;gap:10px;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;
    }

    .badge{width:8px;height:8px;border-radius:50%;background:rgba(30,109,255,.95);box-shadow:0 0 0 3px rgba(30,109,255,.18);flex:0 0 auto;}
    .right{display:flex;align-items:center;gap:10px;flex:0 0 auto;}
    .dots{display:flex;gap:6px;opacity:.7}
    .dots span{width:4px;height:4px;border-radius:50%;background:rgba(233,238,247,.75)}

    .body{position:relative;z-index:1;padding:calc(var(--header-h) + 10px) 12px 12px;display:grid;gap:10px;}

    .context{display:grid;gap:3px;min-width:0;}
    .position{
      font-size:16px;line-height:1.05;font-weight:850;letter-spacing:.01em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);
    }
    .summary{
      font-size:11px;line-height:1.2;color:var(--muted);font-weight:650;
      letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }

    .statBar{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;}
    .stat{min-width:0;padding:8px 9px;border-radius:12px;background:rgba(10,14,18,.28);border:1px solid var(--stroke-soft);}
    .statLabel{font-size:8px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;white-space:nowrap;}
    .statValue{font-size:16px;line-height:1;font-weight:850;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .trafficGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;}
    .panel{min-width:0;border-radius:14px;background:rgba(10,14,18,.24);border:1px solid var(--stroke-soft);padding:9px 10px;display:flex;flex-direction:column;gap:7px;}
    .panelTitle{display:flex;align-items:center;gap:7px;min-width:0;font-size:10px;font-weight:800;letter-spacing:.10em;text-transform:uppercase;color:var(--text);white-space:nowrap;}
    .miniDot{width:6px;height:6px;border-radius:50%;background:rgba(30,109,255,.95);box-shadow:0 0 0 2px rgba(30,109,255,.18);flex:0 0 auto;}
    .nextCallsign{font-size:18px;line-height:1.02;font-weight:850;letter-spacing:.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
    .empty .nextCallsign{color:var(--muted);}

    .metaGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px 9px;}
    .kv{display:flex;flex-direction:column;gap:3px;min-width:0;}
    .k{font-size:8px;line-height:1;font-weight:750;letter-spacing:.10em;text-transform:uppercase;color:var(--muted-soft);white-space:nowrap;}
    .v{font-size:13px;line-height:1.15;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  </style>
</head>
<body>
  <div class="stage">
    <section class="card" aria-label="ATC flight data overlay">
      <div class="header">
        <div class="title"><span class="badge"></span> LIVE TRAFFIC</div>
        <div class="right">
          <div class="dots" aria-hidden="true"><span></span><span></span><span></span></div>
        </div>
      </div>

      <div class="body">
        <div class="context">
          <div class="position" id="position-name">—</div>
          <div class="summary" id="runway-summary">ARR — / DEP —</div>
        </div>

        <div class="statBar">
          <div class="stat">
            <div class="statLabel">On Frequency</div>
            <div class="statValue" id="on-frequency">—</div>
          </div>
          <div class="stat">
            <div class="statLabel">Arrivals</div>
            <div class="statValue" id="arrivals">—</div>
          </div>
          <div class="stat">
            <div class="statLabel">Departures</div>
            <div class="statValue" id="departures">—</div>
          </div>
        </div>

        <div class="trafficGrid">
          <div class="panel" id="arrival-panel">
            <div class="panelTitle"><span class="miniDot"></span> Next Arrival</div>
            <div class="nextCallsign" id="arrival-callsign">—</div>
            <div class="metaGrid">
              <div class="kv">
                <div class="k">Distance</div>
                <div class="v" id="arrival-distance">—</div>
              </div>
              <div class="kv">
                <div class="k">Altitude</div>
                <div class="v" id="arrival-altitude">—</div>
              </div>
            </div>
          </div>

          <div class="panel" id="departure-panel">
            <div class="panelTitle"><span class="miniDot"></span> Next Departure</div>
            <div class="nextCallsign" id="departure-callsign">—</div>
            <div class="metaGrid">
              <div class="kv">
                <div class="k">SID</div>
                <div class="v" id="departure-sid">—</div>
              </div>
              <div class="kv">
                <div class="k">Status</div>
                <div class="v" id="departure-status">Waiting</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const POLL_MS = 1000;
    const FRESH_MS = 5000;

    function setText(id, value){
      const el = document.getElementById(id);
      if (el) el.textContent = value ?? '—';
    }

    function formatNm(value){
      const num = Number(value);
      if (!Number.isFinite(num)) return '—';
      const rounded = Math.round(num * 2) / 2;
      return `${rounded.toFixed(rounded % 1 === 0 ? 0 : 1)}nm`;
    }

    function formatFt(value){
      const num = Number(value);
      if (!Number.isFinite(num)) return '—';
      const rounded = Math.round(num / 100) * 100;
      return `${rounded.toLocaleString('en-GB')}ft`;
    }

    function pickArrivalRunway(overlay){
      return overlay?.active_landing_runway || overlay?.landing_runway || '—';
    }

    function pickDepartureRunway(overlay){
      return overlay?.active_departure_runway || overlay?.departure_runway || '—';
    }

    function setPanelEmpty(panelId, empty){
      const panel = document.getElementById(panelId);
      if (panel) panel.classList.toggle('empty', !!empty);
    }

    function mapDepartureStatus(flight){
      const raw = String(flight?.ground_state || flight?.ground || flight?.status || '').trim().toUpperCase();
      if (!raw) return 'Waiting';
      if (raw === 'PUSH') return 'Pushing';
      if (raw === 'TAXI') return 'Taxying';
      if (raw === 'DEPA' || raw.startsWith('DEP')) return 'Departing';
      return raw;
    }

    function renderArrival(flight){
      const empty = !flight;
      setPanelEmpty('arrival-panel', empty);
      setText('arrival-callsign', empty ? 'No traffic' : (flight.callsign || '—'));
      const distanceNm = flight && Object.prototype.hasOwnProperty.call(flight, 'distance_nm') ? flight.distance_nm : flight?.dist_nm;
      const altitudeFt = flight && Object.prototype.hasOwnProperty.call(flight, 'altitude_ft') ? flight.altitude_ft : flight?.alt_ft;
      setText('arrival-distance', empty ? '—' : formatNm(distanceNm));
      setText('arrival-altitude', empty ? '—' : formatFt(altitudeFt));
    }

    function renderDeparture(flight){
      const empty = !flight;
      setPanelEmpty('departure-panel', empty);
      setText('departure-callsign', empty ? 'No traffic' : (flight.callsign || '—'));
      setText('departure-sid', empty ? '—' : (flight.sid || '—'));
      setText('departure-status', empty ? 'Waiting' : mapDepartureStatus(flight));
    }

    function normaliseData(data){
      const payload = data && typeof data === 'object' ? data : {};
      const overlay = payload.overlay && typeof payload.overlay === 'object' ? payload.overlay : payload;
      const tsMs = Number(payload.ts_ms ?? overlay.ts_ms ?? 0);
      const connected = typeof payload.connected === 'boolean'
        ? payload.connected
        : (Number.isFinite(tsMs) && tsMs > 0 ? (Date.now() - tsMs) <= FRESH_MS : false);
      return { overlay, tsMs, connected };
    }

    function render(data){
      const { overlay } = normaliseData(data);
      const positionName = overlay.position_name || overlay.position_callsign || overlay.position || '—';
      const onFrequency = Number.isFinite(Number(overlay.on_frequency))
        ? Number(overlay.on_frequency)
        : (Number.isFinite(Number(overlay.assumed_now))
            ? Number(overlay.assumed_now)
            : (Array.isArray(overlay.assumed_list) ? overlay.assumed_list.length : null));
      const arrivals = Number.isFinite(Number(overlay.arrivals))
        ? Number(overlay.arrivals)
        : (Array.isArray(overlay.inbound) ? overlay.inbound.length : null);
      const departures = Number.isFinite(Number(overlay.departures))
        ? Number(overlay.departures)
        : (Array.isArray(overlay.depa) ? overlay.depa.length : null);

      setText('position-name', positionName);
      setText('runway-summary', `ARR ${pickArrivalRunway(overlay)} / DEP ${pickDepartureRunway(overlay)}`);
      setText('on-frequency', onFrequency == null ? '—' : String(onFrequency));
      setText('arrivals', arrivals == null ? '—' : String(arrivals));
      setText('departures', departures == null ? '—' : String(departures));

      renderArrival(overlay.next_arrival);
      renderDeparture(overlay.next_departure);
    }

    function renderError(){ render({}); }

    async function refresh(){
      try {
        const res = await fetch('/api/euroscope/traffic', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        render(data);
      } catch (err) {
        console.error('ATC flight data refresh failed:', err);
        renderError();
      }
    }

    refresh();
    setInterval(refresh, POLL_MS);
  </script>
</body>
</html>
