<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>VATSIM Flight Bar (Portrait)</title>

  <style>
    :root{
      --blue:#1e6dff;
      --panel: rgba(18,22,28,.72);
      --stroke: rgba(255,255,255,.12);
      --text: rgba(233,238,247,.92);
      --muted: rgba(233,238,247,.70);

      /* Placement (portrait) */
      --pad: 16px;
      --top-offset: 64px;    /* sits under your top bar */
      --bottom-safe: 0px;

      /* Sizing */
      --radius: 18px;
      --h: 72px;            /* two-row bar */
      --max-w: 980px;       /* keeps it from going comically wide on tall canvases */
    }

    html,body{
      width:100%;
      height:100%;
      margin:0;
      background:transparent;
      font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
      overflow:hidden;
    }

    .bar{
      position:absolute;
      top: var(--top-offset);
      left: var(--pad);
      right: var(--pad);
      height: var(--h);
      max-width: var(--max-w);
      margin: 0 auto;

      display:grid;
      grid-template-rows: 1fr 1fr;
      row-gap: 8px;
      align-content:center;

      padding: 10px 12px;
      box-sizing:border-box;

      border-radius: var(--radius);
      background: var(--panel);
      border: 1px solid var(--stroke);

      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 18px 48px rgba(0,0,0,.35);

      pointer-events:none;
      overflow:hidden;
    }

    .row1{
      display:grid;
      grid-template-columns: 1fr auto;
      column-gap: 10px;
      align-items:center;
      min-width:0;
    }

    .row2{
      display:grid;
      grid-template-columns: auto 1fr;
      column-gap: 10px;
      align-items:center;
      min-width:0;
    }

    /* Left: VATSIM + CALLSIGN + PLAN */
    .left{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width: 0;
    }
    .dot{
      width:8px;height:8px;border-radius:50%;
      background: rgba(30,109,255,.95);
      box-shadow: 0 0 0 3px rgba(30,109,255,.18);
      flex:0 0 auto;
    }
    .tag{
      font-size: 11px;
      font-weight: 750;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }
    .callsign{
      font-size: 20px;
      font-weight: 900;
      letter-spacing: .3px;
      color: var(--text);
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      max-width: 320px;
      line-height: 1;
    }
    .pill{
      display:inline-flex;
      align-items:center;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid rgba(131,174,252,.28);
      background: rgba(131,174,252,.08);
      color: rgba(131,174,252,.95);
      font-size: 10px;
      font-weight: 850;
      letter-spacing: .10em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Route (compact, always visible) */
    .route{
      display:flex;
      align-items:center;
      gap: 10px;
      justify-content:flex-end;
      min-width:0;
    }
    .icao{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(10,14,18,.35);
      border: 1px solid rgba(255,255,255,.12);
      color: var(--text);
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
      min-width: 74px;
      line-height: 1;
    }
    .arrow{
      color: var(--muted);
      font-weight: 900;
      letter-spacing: .12em;
      font-size: 12px;
      line-height: 1;
    }

    /* Telemetry */
    .kv{
      display:flex;
      align-items:center;
      gap: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(10,14,18,.28);
      border: 1px solid rgba(255,255,255,.10);
      white-space: nowrap;
    }
    .k{
      color: var(--muted);
      font-weight: 850;
      letter-spacing: .10em;
      text-transform: uppercase;
      font-size: 10px;
      line-height: 1;
    }
    .v{
      color: var(--text);
      font-weight: 900;
      font-size: 13px;
      letter-spacing: .2px;
      line-height: 1;
    }
    .telemetry{
      display:flex;
      align-items:center;
      gap: 10px;
      min-width:0;
    }
    .status{
      color: var(--muted);
      font-size: 10px;
      white-space: nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      line-height: 1.1;
      min-width: 0;
      justify-self:end;
      text-align:right;
    }

    /* Border progress (mirrored + edges) */
    .borderProg{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .borderProg svg{ width:100%; height:100%; display:block; }
    .borderTrack{
      fill:none;
      stroke: rgba(255,255,255,.10);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
      stroke-linejoin: round;
      stroke-linecap: round;
    }
    .borderFill{
      fill:none;
      stroke: rgba(30,109,255,.95);
      stroke-width: 2;
      vector-effect: non-scaling-stroke;
      stroke-linejoin: round;
      stroke-linecap: round;
      stroke-dasharray: 0 9999;
      transition: stroke-dasharray .45s ease;
    }

    .bump{ animation: bump .20s ease-out; }
    @keyframes bump{ 0%{transform:translateY(0)} 45%{transform:translateY(-1px)} 100%{transform:translateY(0)} }

    /* Very narrow: hide VATSIM tag first */
    @media (max-width: 420px){
      .tag{ display:none; }
      .callsign{ max-width: 220px; }
      .icao{ min-width: 64px; padding: 6px 10px; }
    }
  </style>
</head>

<body>
  <div class="bar" role="img" aria-label="VATSIM flight bar portrait">
    <div class="row1">
      <div class="left">
        <span class="dot" aria-hidden="true"></span>
        <span class="tag">VATSIM</span>
        <span class="callsign" id="callsign">—</span>
        <span class="pill" id="pill">PLAN</span>
      </div>

      <div class="route" aria-label="route">
        <span class="icao" id="dep">----</span>
        <span class="arrow">→</span>
        <span class="icao" id="dest">----</span>
      </div>
    </div>

    <div class="row2">
      <div class="telemetry">
        <span class="kv"><span class="k">ALT</span><span class="v" id="alt">—</span></span>
        <span class="kv"><span class="k">SPD</span><span class="v" id="spd">—</span></span>
      </div>
      <div class="status" id="status">Waiting for data…</div>
    </div>

    <div class="borderProg" aria-hidden="true">
      <svg viewBox="0 0 100 100" preserveAspectRatio="none">
        <path class="borderTrack" id="bpTrack" d="" />
        <path class="borderFill"  id="bpFillTop" d="" />
        <path class="borderFill"  id="bpFillBot" d="" />
        <path class="borderFill"  id="bpFillLeft" d="" />
        <path class="borderFill"  id="bpFillRight" d="" />
      </svg>
    </div>
  </div>

<script>
(() => {
  const ENDPOINT = "/api/simbrief/flight";
  const POLL_MS  = 900;

  const elCallsign = document.getElementById("callsign");
  const elDep      = document.getElementById("dep");
  const elDest     = document.getElementById("dest");
  const elAlt      = document.getElementById("alt");
  const elSpd      = document.getElementById("spd");
  const elPill     = document.getElementById("pill");
  const elStatus   = document.getElementById("status");

  const elBpTrack     = document.getElementById("bpTrack");
  const elBpFillTop   = document.getElementById("bpFillTop");
  const elBpFillBot   = document.getElementById("bpFillBot");
  const elBpFillLeft  = document.getElementById("bpFillLeft");
  const elBpFillRight = document.getElementById("bpFillRight");

  let last = { cs:"", dep:"", dst:"", alt:"", spd:"" };
  let smoothPct = 0;

  let pathLenTop = 0;
  let pathLenBot = 0;
  let pathLenLeft = 0;
  let pathLenRight = 0;

  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const clamp = (n,a,b)=>Math.max(a,Math.min(b,n));

  function bump(el){
    el.classList.remove("bump");
    void el.offsetWidth;
    el.classList.add("bump");
  }

  function safeIcao(s){
    const t = (typeof s === "string") ? s.trim().toUpperCase() : "";
    return t && /^[A-Z0-9]{3,5}$/.test(t) ? t : "----";
  }

  function niceAge(seconds){
    if (!(seconds >= 0)) return "";
    if (seconds < 60) return `${Math.round(seconds)}s`;
    const m = Math.round(seconds/60);
    return `${m}m`;
  }

  function setSvgPath(){
    const bar = document.querySelector(".bar");
    const svg = document.querySelector(".borderProg svg");
    if (!bar || !svg || !elBpTrack || !elBpFillTop || !elBpFillBot || !elBpFillLeft || !elBpFillRight) return;

    const r = bar.getBoundingClientRect();
    const w = Math.max(1, Math.round(r.width));
    const h = Math.max(1, Math.round(r.height));
    svg.setAttribute("viewBox", `0 0 ${w} ${h}`);

    const br = getComputedStyle(bar).borderRadius || "16px";
    const rrRaw = parseFloat(br) || 16;

    const strokeW = 2;
    const inset = (strokeW / 2) + 0.75;
    const x0 = inset;
    const y0 = inset;
    const x1 = w - inset;
    const y1 = h - inset;
    const midY = (y0 + y1) / 2;

    const rr = Math.max(2, Math.min(rrRaw, (x1 - x0) / 2, (y1 - y0) / 2));

    const full = [
      `M ${x0+rr} ${y0}`,
      `L ${x1-rr} ${y0}`,
      `A ${rr} ${rr} 0 0 1 ${x1} ${y0+rr}`,
      `L ${x1} ${y1-rr}`,
      `A ${rr} ${rr} 0 0 1 ${x1-rr} ${y1}`,
      `L ${x0+rr} ${y1}`,
      `A ${rr} ${rr} 0 0 1 ${x0} ${y1-rr}`,
      `L ${x0} ${y0+rr}`,
      `A ${rr} ${rr} 0 0 1 ${x0+rr} ${y0}`,
      `Z`
    ].join(" ");

    const top = [
      `M ${x0} ${midY}`,
      `L ${x0} ${y0+rr}`,
      `A ${rr} ${rr} 0 0 1 ${x0+rr} ${y0}`,
      `L ${x1-rr} ${y0}`,
      `A ${rr} ${rr} 0 0 1 ${x1} ${y0+rr}`,
      `L ${x1} ${midY}`
    ].join(" ");

    const bot = [
      `M ${x0} ${midY}`,
      `L ${x0} ${y1-rr}`,
      `A ${rr} ${rr} 0 0 0 ${x0+rr} ${y1}`,
      `L ${x1-rr} ${y1}`,
      `A ${rr} ${rr} 0 0 0 ${x1} ${y1-rr}`,
      `L ${x1} ${midY}`
    ].join(" ");

    const left = [
      `M ${x0} ${midY}`,
      `L ${x0} ${y0+rr}`,
      `M ${x0} ${midY}`,
      `L ${x0} ${y1-rr}`
    ].join(" ");

    const right = [
      `M ${x1} ${midY}`,
      `L ${x1} ${y0+rr}`,
      `M ${x1} ${midY}`,
      `L ${x1} ${y1-rr}`
    ].join(" ");

    elBpTrack.setAttribute("d", full);
    elBpFillTop.setAttribute("d", top);
    elBpFillBot.setAttribute("d", bot);
    elBpFillLeft.setAttribute("d", left);
    elBpFillRight.setAttribute("d", right);

    try{
      pathLenTop = elBpFillTop.getTotalLength();
      pathLenBot = elBpFillBot.getTotalLength();
      pathLenLeft = elBpFillLeft.getTotalLength();
      pathLenRight = elBpFillRight.getTotalLength();
    }catch(_e){
      pathLenTop = pathLenBot = pathLenLeft = pathLenRight = 0;
    }
  }

  function easeInOut(t){
    t = clamp(t, 0, 1);
    return t * t * (3 - 2 * t);
  }

  function setDash(el, len, pct){
    if (!el || !len) return;
    const draw = len * (pct / 100.0);
    el.style.strokeDasharray = `${draw} ${Math.max(0, len - draw)}`;
  }

  function setProgressPct(pct){
    pct = clamp(pct, 0, 100);

    setDash(elBpFillTop, pathLenTop, pct);
    setDash(elBpFillBot, pathLenBot, pct);

    setDash(elBpFillLeft, pathLenLeft, pct);

    const rightPct = easeInOut((pct - 70) / 30) * 100;
    setDash(elBpFillRight, pathLenRight, rightPct);
  }

  // Build border path + keep it in sync
  setSvgPath();
  if (typeof ResizeObserver !== "undefined") {
    const ro = new ResizeObserver(() => { setSvgPath(); setProgressPct(smoothPct); });
    const barEl = document.querySelector(".bar");
    if (barEl) ro.observe(barEl);
  } else {
    window.addEventListener("resize", () => { setSvgPath(); setProgressPct(smoothPct); });
    setInterval(() => { setSvgPath(); setProgressPct(smoothPct); }, 2000);
  }

  async function tick(){
    while(true){
      try{
        const r = await fetch(ENDPOINT, { cache:"no-store" });
        if(!r.ok) throw new Error(`HTTP ${r.status}`);
        const j = await r.json();

        const ok = j && j.ok === true;
        const cs = (j && typeof j.callsign === "string") ? j.callsign.trim() : "";
        const dep = safeIcao(j && j.departure);
        const dst = safeIcao(j && j.destination);

        const age = (j && typeof j.age_seconds === "number") ? j.age_seconds : null;
        const ageTxt = age != null ? `age ${niceAge(age)}` : "";

        elPill.textContent = ok ? "PLAN" : "STALE";
        if (ok) elStatus.textContent = ageTxt ? `SimBrief loaded • ${ageTxt}` : "SimBrief loaded";
        else elStatus.textContent = (j && j.error) ? `SimBrief error: ${j.error}` : "SimBrief unavailable";

        if (cs && cs !== last.cs){ elCallsign.textContent = cs; bump(elCallsign); last.cs = cs; }
        if (dep !== last.dep){ elDep.textContent = dep; bump(elDep); last.dep = dep; }
        if (dst !== last.dst){ elDest.textContent = dst; bump(elDest); last.dst = dst; }

        if (j && typeof j.altitude_ft === "number" && isFinite(j.altitude_ft)){
          const a = Math.round(j.altitude_ft).toLocaleString() + "ft";
          if (a !== last.alt){ elAlt.textContent = a; bump(elAlt); last.alt = a; }
        } else {
          elAlt.textContent = "—";
          last.alt = "";
        }

        if (j && typeof j.speed_kts === "number" && isFinite(j.speed_kts)){
          const s = Math.round(j.speed_kts).toLocaleString() + "kt";
          if (s !== last.spd){ elSpd.textContent = s; bump(elSpd); last.spd = s; }
        } else {
          elSpd.textContent = "—";
          last.spd = "";
        }

        let pct = 0;
        if (j && typeof j.progress === "number" && isFinite(j.progress)) pct = j.progress * 100.0;
        else if (j && typeof j.progress_pct === "number" && isFinite(j.progress_pct)) pct = j.progress_pct;

        pct = clamp(pct, 0, 100);
        smoothPct = smoothPct + (pct - smoothPct) * 0.25;
        setProgressPct(smoothPct);

      }catch(e){
        elStatus.textContent = "Waiting for data…";
        elAlt.textContent = "—";
        elSpd.textContent = "—";
        smoothPct = 0;
        setProgressPct(0);
      }

      await sleep(POLL_MS);
    }
  }

  tick();
})();
</script>
</body>
</html>
