<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Glass Header (Dynamic Smooth)</title>

<style>
  :root{
    --blue:#1e6dff;
    --panel: rgba(18,22,28,.72);
    --panel-deep: rgba(10,14,18,.56);
    --stroke: rgba(255,255,255,.12);
    --stroke-strong: rgba(255,255,255,.18);
    --text: rgba(233,238,247,.92);
    --muted: rgba(233,238,247,.70);

    --logo-drop:32px;
    --logo-shell-size:76px;
    --logo-shell-left:8px;
    --logo-size:56px;
    --logo-offset-in-shell:10px;
    --bar-left-pad:120px;
  }

  html,body{
    width:100%;
    height:100%;
    margin:0;
    background:transparent;
    font-family:Inter,system-ui,Segoe UI,Roboto,Arial,sans-serif;
    overflow:visible;
  }

  .stage{
    width:100%;
    height:100%;
    box-sizing:border-box;
    padding-bottom:var(--logo-drop);
    overflow:visible;
  }

  .bar{
    position:relative;
    isolation:isolate;
    width:100%;
    height:calc(100% - var(--logo-drop));
    min-height:40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px 0 var(--bar-left-pad);
    box-sizing:border-box;
    background:var(--panel);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border-bottom:1px solid var(--stroke);
    pointer-events:none;
    overflow:visible;
  }

  .bar::before{
    content:"";
    position:absolute;
    left:var(--logo-shell-left);
    bottom:calc(-1 * var(--logo-drop));
    width:var(--logo-shell-size);
    height:var(--logo-shell-size);
    border-radius:50%;
    background:var(--panel);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:1px solid var(--stroke);
    box-shadow:0 10px 22px rgba(0,0,0,.24);
    z-index:0;
    pointer-events:none;
  }

  .bar::after{
    content:"";
    position:absolute;
    left:var(--logo-shell-left);
    top:0;
    width:var(--logo-shell-size);
    height:calc(100% - 1px);
    background:var(--panel);
    z-index:1;
    pointer-events:none;
  }

  .left,
  .right{
    z-index:2;
  }

  .right{
    position:relative;
  }

  .left{
    display:flex;
    align-items:center;
    gap:14px;
    min-width:0;
    flex:1 1 auto;
  }

  .brand{
    position:absolute;
    left:calc(var(--logo-shell-left) + ((var(--logo-shell-size) - var(--logo-size)) / 2));
    bottom:calc(((var(--logo-shell-size) - var(--logo-size)) / 2) - var(--logo-drop));
    width:var(--logo-size);
    height:var(--logo-size);
    overflow:visible;
    pointer-events:none;
    z-index:3;
  }

  .logo-wrap{
    position:relative;
    width:100%;
    height:100%;
    display:block;
    overflow:hidden;
    border-radius:50%;
    padding-left:1px;
  }

  .logo-wrap img{
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    display:block;
    border-radius:50%;
    filter:drop-shadow(0 6px 12px rgba(0,0,0,.22));
  }

  .copy{
    min-width:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:2px;
  }

  .title{
    font-weight:700;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:12px;
    line-height:1.1;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:46vw;
  }

  .sub{
    font-size:11px;
    line-height:1.1;
    color:var(--muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:46vw;
  }

  .right{
    display:flex;
    align-items:center;
    gap:14px;
    flex:0 0 auto;
    padding-left:12px;
  }

  .stat{
    display:flex;
    align-items:center;
    gap:8px;
    padding:6px 10px;
    border-radius:12px;
    background:var(--panel-deep);
    border:1px solid rgba(255,255,255,.12);
    font-size:11px;
    font-weight:600;
    color:var(--text);
    white-space:nowrap;
    min-width:106px;
    justify-content:center;
  }

  .dot{
    width:6px;
    height:6px;
    border-radius:50%;
    background:rgba(30,109,255,.9);
    flex:0 0 auto;
  }

  .label{
    color:var(--muted);
    font-weight:650;
    letter-spacing:.08em;
    text-transform:uppercase;
    font-size:10px;
    margin-right:2px;
  }

  .bump{animation:bump .22s ease-out;}
  @keyframes bump{
    0%{transform:translateY(0)}
    45%{transform:translateY(-1px)}
    100%{transform:translateY(0)}
  }

  @media (max-width: 1100px) {
    :root{
      --logo-drop:30px;
      --logo-shell-size:70px;
      --logo-shell-left:8px;
      --logo-size:50px;
      --logo-offset-in-shell:10px;
      --bar-left-pad:110px;
    }

    .bar{
      padding-right:16px;
    }

    .title,.sub{
      max-width:36vw;
    }

    .right{
      gap:10px;
      padding-left:10px;
    }

    .stat{
      min-width:96px;
      padding:6px 9px;
    }
  }

  @media (max-width: 900px) {
    :root{
      --logo-drop:24px;
      --logo-shell-size:64px;
      --logo-shell-left:8px;
      --logo-size:46px;
      --logo-offset-in-shell:9px;
      --bar-left-pad:102px;
    }

    .bar{
      flex-direction:column;
      align-items:stretch;
      justify-content:center;
      gap:10px;
      padding:10px 16px 12px var(--bar-left-pad);
      height:calc(100% - var(--logo-drop));
    }

    .left{
      width:100%;
    }

    .right{
      width:100%;
      justify-content:center;
      padding-left:0;
      flex-wrap:wrap;
    }

    .title,.sub{
      max-width:100%;
    }
  }

  @media (max-width: 600px) {
    :root{
      --logo-drop:20px;
      --logo-shell-size:56px;
      --logo-shell-left:6px;
      --logo-size:40px;
      --logo-offset-in-shell:8px;
      --bar-left-pad:88px;
    }

    .right{
      gap:8px;
    }

    .stat{
      min-width:90px;
      font-size:10px;
      padding:5px 8px;
    }

    .label{
      font-size:9px;
    }
  }
  @media (orientation: portrait) and (min-width: 1000px) and (max-width: 1200px) {
    :root{
      --logo-drop:26px;
      --logo-shell-size:72px;
      --logo-shell-left:10px;
      --logo-size:52px;
      --logo-offset-in-shell:10px;
      --bar-left-pad:108px;
    }

    .bar{
      min-height:108px;
      padding:0 14px 0 var(--bar-left-pad);
      gap:12px;
    }

    .left{
      gap:10px;
    }

    .copy{
      max-width:calc(100vw - 450px);
    }

    .title{
      max-width:none;
      font-size:14px;
      letter-spacing:.09em;
    }

    .sub{
      max-width:none;
      font-size:12px;
    }

    .right{
      gap:8px;
      padding-left:8px;
    }

    .stat{
      min-width:102px;
      padding:6px 8px;
      gap:6px;
      font-size:10px;
      border-radius:11px;
    }

    .label{
      font-size:9px;
      letter-spacing:.07em;
      margin-right:0;
    }
  }

</style>
</head>

    let sum = 0;
    for (const value of values){
      const n = Number(value);
      if (Number.isFinite(n)){
        sum += n;
        found = true;
      }
    }
    return found ? sum : null;
  }

  function getTwitchSubscribers(j){
    const explicitTotal = firstFinite([
      j?.twitch_subscribers,
      j?.twitch?.subscribers,
      j?.twitch?.subscriber_count,
      j?.twitch?.total_subscribers,
      j?.total_subscribers
    ]);
    if (explicitTotal !== null) return explicitTotal;

    return 0;
  }

  async function pollHeader(){
    while(true){
      try{
        const r = await fetch(HEADER_URL, { cache: "no-store" });
        if(!r.ok) throw 0;
        const j = await r.json();
        const t = (j && typeof j.title === "string") ? j.title : "";
        const s = (j && typeof j.subtitle === "string") ? j.subtitle : "";

        if (elHdrTitle && t !== lastHdrTitle){
          elHdrTitle.textContent = t;
          lastHdrTitle = t;
          elHdrTitle.classList.remove("bump");
          void elHdrTitle.offsetWidth;
          elHdrTitle.classList.add("bump");
        }

        if (elHdrSub && s !== lastHdrSub){
          elHdrSub.textContent = s;
          lastHdrSub = s;
          elHdrSub.classList.remove("bump");
          void elHdrSub.offsetWidth;
          elHdrSub.classList.add("bump");
        }
      }catch{}
      await sleep(POLL_MS);
    }
  }

  function makeAnimator(el){
    return {
      el, current:0, target:0, lastText:"",
      set(n){ this.target = Math.max(0, toNum(n)); },
      tick(){
        const d = this.target - this.current;
        this.current += Math.abs(d) < 0.05 ? d : d * 0.2;
        const txt = fmt(this.current);
        if (txt !== this.lastText){
          this.el.textContent = txt;
          this.lastText = txt;
        }
      },
      bump(prev){
        if (prev !== this.target){
          this.el.classList.remove("bump");
          void this.el.offsetWidth;
          this.el.classList.add("bump");
        }
      }
    };
  }

  const animViewers    = makeAnimator(elViewers);
  const animFollowers  = makeAnimator(elFollowers);
  const animSubscribers = makeAnimator(elSubscribers);

  (function raf(){
    animViewers.tick();
    animFollowers.tick();
    animSubscribers.tick();
    requestAnimationFrame(raf);
  })();

  async function poll(){
    while(true){
      try{
        const r = await fetch(METRICS_URL, { cache: "no-store" });
        if(!r.ok) throw 0;
        const j = await r.json();

        let p;
        p = animViewers.target;    animViewers.set(j?.total_viewers);     animViewers.bump(p);
        p = animFollowers.target;  animFollowers.set(j?.total_followers); animFollowers.bump(p);
        p = animSubscribers.target; animSubscribers.set(getTwitchSubscribers(j));  animSubscribers.bump(p);
      }catch{}
      await sleep(POLL_MS);
    }
  }

  poll();
  pollHeader();
</script>
