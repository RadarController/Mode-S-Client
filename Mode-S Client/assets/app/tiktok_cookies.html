<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TikTok Cookies — RadarController</title>
<link rel="stylesheet" href="/app/app.css" />
</head>

<body>

<div class="app" id="tiktokCookiesPage">

<header class="topbar">
<div class="brand">
<div class="brand__mark"></div>
<div class="brand__text">
<div class="brand__title">RadarController</div>
<div class="brand__subtitle">TikTok Cookies</div>
</div>
</div>

<div class="topbar__actions">
<button class="btn btn--ghost" id="btnBackHome">Back</button>
</div>
</header>

<main class="grid grid--single">

<section class="card">
<div class="card__head">
<h2>TikTok Session Cookies</h2>
<p class="muted">
Paste the required TikTok cookies from your browser.
</p>
</div>

<div class="card__body">

<label>tiktok_sessionid</label>
<input type="password" id="ttSession" class="input"/>

<label>tiktok_sessionid_ss</label>
<input type="password" id="ttSessionSS" class="input"/>

<label>tiktok_tt_target_idc</label>
<input type="text" id="ttTarget" class="input"/>

<div class="muted" style="margin-top:10px">
Tip: obtain these from TikTok cookies in your browser.
</div>

<div style="margin-top:20px">
<button class="btn btn--primary" id="btnSaveTikTokCookies">
Save
</button>
</div>

<div id="tiktokCookieStatus" class="muted" style="margin-top:10px"></div>

</div>
</section>

</main>
</div>

<script src="/app/app.js"></script>

</body>
</html>
